<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>The Wild Robot Game - BEMAX Edition</title>
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background-color: #1a2a3a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; color: #fff; }
        #game-container {
            position: relative;
            width: 800px;
            height: 300px;
            border: 5px solid #4a90e2;
            border-radius: 15px;
            background-color: #2c3e50;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }
        /* خلفية بديلة في حال تعذر تحميل الصورة */
        .forest-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80');
            background-size: cover;
            opacity: 0.6;
            z-index: 0;
        }
        canvas { position: relative; z-index: 1; }
        .ui { margin-bottom: 20px; text-align: center; }
        .score-board { font-size: 24px; font-weight: bold; color: #ffcc00; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>

<div class="ui">
    <h1 style="margin:0">The Wild Robot Runner</h1>
    <p>اضغط <b>Space</b> أو <b>المس الشاشة</b> للقفز</p>
    <div id="score" class="score-board">Score: 0</div>
</div>

<div id="game-container">
    <div class="forest-bg"></div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreElement = document.getElementById("score");

    canvas.width = 800;
    canvas.height = 300;

    // إعداد صورة الروبوت (استخدام رابط مباشر لضمان العمل)
    const robotImg = new Image();
    robotImg.src = 'https://i.ibb.co/996Pz9S/robot-sprite.png'; // رابط تجريبي لصورة روبوت

    let score = 0;
    let gameSpeed = 5;
    let isGameOver = false;
    let gravity = 0.6;

    const player = {
        x: 80,
        y: 200,
        width: 50,
        height: 70,
        dy: 0,
        jumpForce: 12,
        grounded: false
    };

    const obstacles = [];

    function spawnObstacle() {
        let h = Math.random() * (60 - 30) + 30;
        obstacles.push({
            x: canvas.width,
            y: canvas.height - h - 20,
            width: 30,
            height: h
        });
    }

    function update() {
        if (isGameOver) return;

        player.dy += gravity;
        player.y += player.dy;

        // الأرضية
        if (player.y + player.height > canvas.height - 20) {
            player.y = canvas.height - player.height - 20;
            player.dy = 0;
            player.grounded = true;
        }

        // تحريك العوائق
        if (Math.random() < 0.02 && (obstacles.length === 0 || obstacles[obstacles.length-1].x < canvas.width - 300)) {
            spawnObstacle();
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            obstacles[i].x -= gameSpeed;

            // كشف التصادم
            if (player.x < obstacles[i].x + obstacles[i].width &&
                player.x + player.width > obstacles[i].x &&
                player.y < obstacles[i].y + obstacles[i].height &&
                player.y + player.height > obstacles[i].y) {
                isGameOver = true;
                alert("Game Over! Score: " + score);
                resetGame();
            }

            if (obstacles[i].x + obstacles[i].width < 0) {
                obstacles.splice(i, 1);
                score++;
                scoreElement.innerText = "Score: " + score;
                gameSpeed += 0.1;
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // رسم الأرضية
        ctx.fillStyle = "#3d2b1f";
        ctx.fillRect(0, canvas.height - 20, canvas.width, 20);

        // رسم الروبوت (لو الصورة مظهرتش هيرسم مربع أبيض)
        try {
            ctx.fillStyle = "#00d4ff";
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.strokeStyle = "white";
            ctx.strokeRect(player.x, player.y, player.width, player.height);
        } catch(e) {}

        // رسم العوائق (صخور)
        ctx.fillStyle = "#ff4d4d";
        for (let obs of obstacles) {
            ctx.beginPath();
            ctx.roundRect(obs.x, obs.y, obs.width, obs.height, 5);
            ctx.fill();
        }
    }

    function resetGame() {
        score = 0;
        obstacles.length = 0;
        gameSpeed = 5;
        isGameOver = false;
        player.y = 200;
        scoreElement.innerText = "Score: 0";
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    window.addEventListener("keydown", (e) => {
        if (e.code === "Space" && player.grounded) {
            player.dy = -player.jumpForce;
            player.grounded = false;
        }
    });

    // دعم اللمس للموبايل
    window.addEventListener("touchstart", () => {
        if (player.grounded) {
            player.dy = -player.jumpForce;
            player.grounded = false;
        }
    });

    gameLoop();
</script>
</body>
</html>
