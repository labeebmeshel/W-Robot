<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Wild Robot - Mobile Version</title>
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background-color: #0d1b2a; font-family: sans-serif; overflow: hidden; touch-action: manipulation; }
        #game-container { position: relative; width: 95vw; max-width: 800px; height: 250px; border: 3px solid #4a90e2; border-radius: 10px; overflow: hidden; background: linear-gradient(to bottom, #1b263b, #415a77); }
        canvas { display: block; width: 100%; height: 100%; }
        .score { position: absolute; top: 10px; right: 20px; font-size: 24px; color: #ffcc00; font-weight: bold; z-index: 10; }
        .hint { color: #fff; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div id="score" class="score">0</div>
<div id="game-container">
    <canvas id="gameCanvas"></canvas>
</div>
<p class="hint">المس الشاشة أو اضغط Space للقفز</p>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreElement = document.getElementById("score");

    canvas.width = 800;
    canvas.height = 250;

    let score = 0;
    let gameSpeed = 5;
    let isGameOver = false;
    let gravity = 0.6;

    const robot = {
        x: 50, y: 170, width: 40, height: 60, dy: 0, jumpForce: 13, grounded: false,
        draw() {
            ctx.fillStyle = "#e0e1dd"; 
            ctx.beginPath();
            ctx.roundRect(this.x, this.y, this.width, this.height, 8);
            ctx.fill();
            ctx.fillStyle = "#e0e1dd";
            ctx.beginPath();
            ctx.arc(this.x + this.width/2, this.y - 8, 18, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#00f2ff"; // عيون الروبوت الزرقاء المضيئة
            ctx.beginPath();
            ctx.arc(this.x + this.width/2 - 6, this.y - 10, 3, 0, Math.PI*2);
            ctx.arc(this.x + this.width/2 + 6, this.y - 10, 3, 0, Math.PI*2);
            ctx.fill();
        },
        jump() {
            if (this.grounded) {
                this.dy = -this.jumpForce;
                this.grounded = false;
            }
        }
    };

    const obstacles = [];
    function spawnObstacle() {
        let size = Math.random() * (50 - 20) + 20;
        obstacles.push({ x: canvas.width, y: canvas.height - size - 20, width: 25, height: size });
    }

    function update() {
        if (isGameOver) return;
        robot.dy += gravity;
        robot.y += robot.dy;

        if (robot.y + robot.height > canvas.height - 20) {
            robot.y = canvas.height - robot.height - 20;
            robot.dy = 0;
            robot.grounded = true;
        }

        if (Math.random() < 0.015 && (obstacles.length === 0 || obstacles[obstacles.length-1].x < canvas.width - 280)) {
            spawnObstacle();
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            obstacles[i].x -= gameSpeed;
            if (robot.x < obstacles[i].x + obstacles[i].width &&
                robot.x + robot.width > obstacles[i].x &&
                robot.y < obstacles[i].y + obstacles[i].height &&
                robot.y + robot.height > obstacles[i].y) {
                isGameOver = true;
                alert("Game Over! Score: " + score);
                location.reload();
            }
            if (obstacles[i].x + obstacles[i].width < 0) {
                obstacles.splice(i, 1);
                score++;
                scoreElement.innerText = score;
                gameSpeed += 0.1;
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#1b263b";
        ctx.fillRect(0, canvas.height - 20, canvas.width, 20);
        robot.draw();
        ctx.fillStyle = "#ff4d4d";
        for (let obs of obstacles) {
            ctx.beginPath();
            ctx.roundRect(obs.x, obs.y, obs.width, obs.height, 5);
            ctx.fill();
        }
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    // دعم الموبايل والكمبيوتر معاً
    window.addEventListener("keydown", (e) => { if (e.code === "Space") robot.jump(); });
    window.addEventListener("touchstart", (e) => { 
        e.preventDefault(); // يمنع زووم المتصفح عند اللمس المتكرر
        robot.jump(); 
    }, { passive: false });

    gameLoop();
</script>
</body>
</html>
