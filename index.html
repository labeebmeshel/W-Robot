<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Wild Robot - Pro Edition</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background-color: #0d1b2a; font-family: sans-serif; overflow: hidden; touch-action: manipulation; }
        #game-container { position: relative; width: 95vw; max-width: 800px; height: 300px; border: 4px solid #4a90e2; border-radius: 15px; overflow: hidden; background: linear-gradient(to bottom, #1b263b, #415a77); }
        canvas { display: block; width: 100%; height: 100%; }
        .ui-overlay { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; pointer-events: none; z-index: 10; }
        .stat-box { background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; color: #ffcc00; font-weight: bold; border: 1px solid #4a90e2; }
        .instructions { color: #e0e1dd; margin-top: 10px; font-size: 14px; text-align: center; }
    </style>
</head>
<body>

<div class="ui-overlay">
    <div class="stat-box">Score: <span id="score">0</span></div>
    <div class="stat-box">Best: <span id="highScore">0</span></div>
</div>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
</div>
<div class="instructions">
    للكمبيوتر: <b>Space</b> للقفز | <b>Arrow Down</b> للانحناء <br>
    للموبايل: <b>المس الشاشة</b> للقفز
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreElement = document.getElementById("score");
    const highScoreElement = document.getElementById("highScore");

    canvas.width = 800;
    canvas.height = 300;

    // --- المحرك الصوتي (Web Audio API) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(freq, type, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    let score = 0;
    let highScore = localStorage.getItem("wildRobotHighScore") || 0;
    highScoreElement.innerText = highScore;
    let gameSpeed = 5;
    let isGameOver = false;

    const robot = {
        x: 50, y: 200, width: 45, height: 75, 
        baseHeight: 75, crouchHeight: 40,
        dy: 0, jumpForce: 13, grounded: false, isCrouching: false,
        draw() {
            ctx.save();
            // الروبوت (مرسوم بالكود بناءً على صورتك)
            ctx.fillStyle = "#e0e1dd";
            let drawY = this.isCrouching ? this.y + (this.baseHeight - this.crouchHeight) : this.y;
            let drawH = this.isCrouching ? this.crouchHeight : this.height;
            
            ctx.beginPath();
            ctx.roundRect(this.x, drawY, this.width, drawH, 10);
            ctx.fill();

            // الرأس والعين (تتحرك مع الانحناء)
            let headY = this.isCrouching ? drawY - 5 : this.y - 12;
            ctx.beginPath();
            ctx.arc(this.x + this.width/2, headY, 20, 0, Math.PI*2);
            ctx.fill();
            
            ctx.fillStyle = "#00f2ff";
            ctx.beginPath();
            ctx.arc(this.x + this.width/2 - 7, headY - 3, 4, 0, Math.PI*2);
            ctx.arc(this.x + this.width/2 + 7, headY - 3, 4, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }
    };

    const obstacles = [];
    function spawnObstacle() {
        const type = Math.random() > 0.3 ? 'ground' : 'air';
        if (type === 'ground') {
            obstacles.push({ x: canvas.width, y: 230, width: 30, height: 50, type: 'ground' });
        } else {
            obstacles.push({ x: canvas.width, y: 150, width: 40, height: 30, type: 'air' });
        }
    }

    function update() {
        if (isGameOver) return;
        
        robot.dy += 0.6; // Gravity
        robot.y += robot.dy;

        if (robot.y + robot.height > 280) {
            robot.y = 280 - robot.height;
            robot.dy = 0;
            robot.grounded = true;
        }

        if (Math.random() < 0.015 && (obstacles.length === 0 || obstacles[obstacles.length-1].x < canvas.width - 300)) {
            spawnObstacle();
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            obstacles[i].x -= gameSpeed;
            
            // حساب منطقة الاصطدام بناءً على حالة الانحناء
            let rY = robot.isCrouching ? robot.y + (robot.baseHeight - robot.crouchHeight) : robot.y;
            let rH = robot.isCrouching ? robot.crouchHeight : robot.height;

            if (robot.x < obstacles[i].x + obstacles[i].width &&
                robot.x + robot.width > obstacles[i].x &&
                rY < obstacles[i].y + obstacles[i].height &&
                rY + rH > obstacles[i].y) {
                gameOver();
            }

            if (obstacles[i].x + obstacles[i].width < 0) {
                obstacles.splice(i, 1);
                score++;
                scoreElement.innerText = score;
                gameSpeed += 0.05;
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#1b263b";
        ctx.fillRect(0, 280, canvas.width, 20); // Ground
        robot.draw();
        for (let obs of obstacles) {
            ctx.fillStyle = obs.type === 'ground' ? "#ff4d4d" : "#ffcc00";
            ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
        }
    }

    function gameOver() {
        isGameOver = true;
        playSound(150, 'sawtooth', 0.5); // صوت الخسارة
        if (score > highScore) {
            localStorage.setItem("wildRobotHighScore", score);
        }
        alert("انتهت اللعبة! النتيجة: " + score);
        location.reload();
    }

    function gameLoop() {
        update(); draw();
        requestAnimationFrame(gameLoop);
    }

    // التحكم بالكمبيوتر
    window.addEventListener("keydown", (e) => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (e.code === "Space" && robot.grounded) {
            robot.dy = -robot.jumpForce;
            robot.grounded = false;
            playSound(440, 'sine', 0.1); // صوت القفز
        }
        if (e.code === "ArrowDown") {
            robot.isCrouching = true;
            playSound(200, 'square', 0.05); // صوت الانحناء
        }
    });

    window.addEventListener("keyup", (e) => {
        if (e.code === "ArrowDown") robot.isCrouching = false;
    });

    // دعم الموبايل (لمس للقفز)
    window.addEventListener("touchstart", (e) => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        e.preventDefault();
        if (robot.grounded) {
            robot.dy = -robot.jumpForce;
            robot.grounded = false;
            playSound(440, 'sine', 0.1);
        }
    }, { passive: false });

    gameLoop();
</script>
</body>
</html>
