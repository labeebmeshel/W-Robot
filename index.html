<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>The Wild Robot - BEMAX Edition</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background-color: #0d1b2a; font-family: sans-serif; overflow: hidden; color: #fff; }
        #game-container { position: relative; width: 800px; height: 300px; border: 4px solid #4a90e2; border-radius: 15px; overflow: hidden; background: #1b263b; box-shadow: 0 0 30px rgba(74,144,226,0.3); }
        canvas { display: block; background: linear-gradient(to bottom, #1b263b, #415a77); }
        .ui { text-align: center; margin-bottom: 10px; }
        .score { font-size: 32px; color: #e0e1dd; font-weight: bold; }
    </style>
</head>
<body>

<div class="ui">
    <h1>The Wild Robot Runner</h1>
    <div id="score" class="score">0</div>
</div>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreElement = document.getElementById("score");

    canvas.width = 800;
    canvas.height = 300;

    let score = 0;
    let gameSpeed = 5;
    let isGameOver = false;
    let gravity = 0.6;

    // كائن الروبوت (الروبوت اللي بعتهولي مبرمج هنا كأبعاد وشكل)
    const robot = {
        x: 50, y: 200, width: 45, height: 75, dy: 0, jumpForce: 13, grounded: false,
        draw() {
            // رسم جسم الروبوت (مستوحى من تصميم الروبوت في صورتك)
            ctx.fillStyle = "#e0e1dd"; // لون الجسم الفضي
            ctx.beginPath();
            ctx.roundRect(this.x, this.y, this.width, this.height, 10);
            ctx.fill();
            // الرأس
            ctx.fillStyle = "#e0e1dd";
            ctx.beginPath();
            ctx.arc(this.x + this.width/2, this.y - 10, 20, 0, Math.PI*2);
            ctx.fill();
            // العيون الزرقاء (زي الروبوت اللي بعته)
            ctx.fillStyle = "#00f2ff";
            ctx.beginPath();
            ctx.arc(this.x + this.width/2 - 7, this.y - 12, 4, 0, Math.PI*2);
            ctx.arc(this.x + this.width/2 + 7, this.y - 12, 4, 0, Math.PI*2);
            ctx.fill();
        }
    };

    const obstacles = [];
    function spawnObstacle() {
        let size = Math.random() * (50 - 20) + 20;
        obstacles.push({ x: canvas.width, y: canvas.height - size - 20, width: 25, height: size });
    }

    function update() {
        if (isGameOver) return;
        robot.dy += gravity;
        robot.y += robot.dy;

        if (robot.y + robot.height > canvas.height - 20) {
            robot.y = canvas.height - robot.height - 20;
            robot.dy = 0;
            robot.grounded = true;
        }

        if (Math.random() < 0.02 && (obstacles.length === 0 || obstacles[obstacles.length-1].x < canvas.width - 250)) {
            spawnObstacle();
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            obstacles[i].x -= gameSpeed;
            // التصادم
            if (robot.x < obstacles[i].x + obstacles[i].width &&
                robot.x + robot.width > obstacles[i].x &&
                robot.y < obstacles[i].y + obstacles[i].height &&
                robot.y + robot.height > obstacles[i].y) {
                isGameOver = true;
                alert("انتهت اللعبة! النتيجة: " + score);
                location.reload();
            }
            if (obstacles[i].x + obstacles[i].width < 0) {
                obstacles.splice(i, 1);
                score++;
                scoreElement.innerText = score;
                gameSpeed += 0.1;
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // رسم الأرضية
        ctx.fillStyle = "#1b263b";
        ctx.fillRect(0, canvas.height - 20, canvas.width, 20);
        // رسم الروبوت
        robot.draw();
        // رسم العوائق (صخور الغابة)
        ctx.fillStyle = "#ff4d4d";
        for (let obs of obstacles) {
            ctx.beginPath();
            ctx.roundRect(obs.x, obs.y, obs.width, obs.height, 5);
            ctx.fill();
        }
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    window.addEventListener("keydown", (e) => {
        if (e.code === "Space" && robot.grounded) {
            robot.dy = -robot.jumpForce;
            robot.grounded = false;
        }
    });

    gameLoop();
</script>
</body>
</html>
