<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Wild Robot - BEMAX Pro</title>
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background-color: #050a0f; font-family: sans-serif; overflow: hidden; touch-action: none; }
        #game-container { position: relative; width: 95vw; max-width: 850px; height: 350px; border: 3px solid #00f2ff; border-radius: 20px; overflow: hidden; box-shadow: 0 0 50px rgba(0, 242, 255, 0.2); }
        canvas { display: block; width: 100%; height: 100%; }
        .stats { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-around; pointer-events: none; z-index: 100; }
        .box { background: rgba(0,0,0,0.8); padding: 8px 20px; border-radius: 12px; border: 1px solid #00f2ff; color: #00f2ff; font-weight: bold; font-family: monospace; font-size: 20px; }
    </style>
</head>
<body>

<div class="stats">
    <div class="box">DIST: <span id="score">0</span>m</div>
    <div class="box">BEST: <span id="highScore">0</span>m</div>
</div>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreElement = document.getElementById("score");
    const highScoreElement = document.getElementById("highScore");

    canvas.width = 800;
    canvas.height = 350;

    // --- تحميل الصور ---
    const bgImg = new Image();
    bgImg.src = 'wild_robot_bg.jpg';
    
    const robotImg = new Image();
    robotImg.src = 'robot_character.png'; // تأكد أن صورة الروبوت بهذا الاسم في ملفاتك

    let score = 0;
    let highScore = localStorage.getItem("robotBestDist") || 0;
    highScoreElement.innerText = highScore;
    let gameSpeed = 6;
    let isGameOver = false;
    let frame = 0;
    let bgX = 0;

    const robot = {
        x: 100, y: 220, width: 60, height: 90,
        baseHeight: 90, crouchHeight: 50,
        dy: 0, jumpForce: 15, grounded: false, isCrouching: false,
        legOffset: 0,
        draw() {
            ctx.save();
            let drawH = this.isCrouching ? this.crouchHeight : this.height;
            let drawY = this.isCrouching ? this.y + (this.baseHeight - this.crouchHeight) : this.y;

            // تأثير حركة الأرجل الواقعي (اهتزاز طفيف للجسم يوحي بالجري)
            this.legOffset = Math.sin(frame * 0.2) * 3;
            
            if (robotImg.complete) {
                // رسم الشخصية الحقيقية مع تعديل الارتفاع عند الانحناء
                ctx.drawImage(robotImg, this.x, drawY + this.legOffset, this.width, drawH);
            } else {
                // شكل احتياطي لو الصورة لم تحمل
                ctx.fillStyle = "#e0e1dd";
                ctx.fillRect(this.x, drawY, this.width, drawH);
            }
            ctx.restore();
        }
    };

    const obstacles = [];
    function spawnObstacle() {
        const isAir = Math.random() > 0.5;
        if (isAir) {
            // عائق عالي (لازم تنحني عشان متخبطش فيه)
            obstacles.push({ x: canvas.width, y: 190, width: 60, height: 40, type: 'air' });
        } else {
            // عائق أرضي (لازم تنط)
            obstacles.push({ x: canvas.width, y: 270, width: 35, height: 45, type: 'ground' });
        }
    }

    function update() {
        if (isGameOver) return;
        frame++;
        
        bgX -= gameSpeed * 0.8;
        if (bgX <= -canvas.width) bgX = 0;

        score += Math.floor(gameSpeed / 6);
        scoreElement.innerText = score;

        robot.dy += 0.8; 
        robot.y += robot.dy;

        if (robot.y + robot.height > 320) {
            robot.y = 320 - robot.height;
            robot.dy = 0;
            robot.grounded = true;
        }

        if (frame % 80 === 0) spawnObstacle();

        for (let i = obstacles.length - 1; i >= 0; i--) {
            obstacles[i].x -= gameSpeed;

            // تحديد منطقة التصادم (Hitbox) بدقة
            let rY = robot.isCrouching ? robot.y + (robot.baseHeight - robot.crouchHeight) : robot.y;
            let rH = robot.isCrouching ? robot.crouchHeight : robot.height;

            // إذا كان الروبوت غير منحني (واقف)، رأسه سيصطدم بالعوائق العالية
            if (robot.x + 10 < obstacles[i].x + obstacles[i].width &&
                robot.x + robot.width - 10 > obstacles[i].x &&
                rY < obstacles[i].y + obstacles[i].height &&
                rY + rH > obstacles[i].y) {
                endGame();
            }

            if (obstacles[i].x + obstacles[i].width < 0) obstacles.splice(i, 1);
        }
        if (frame % 500 === 0) gameSpeed += 0.5;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (bgImg.complete) {
            ctx.drawImage(bgImg, bgX, 0, canvas.width, canvas.height);
            ctx.drawImage(bgImg, bgX + canvas.width, 0, canvas.width, canvas.height);
        }
        robot.draw();
        for (let obs of obstacles) {
            ctx.fillStyle = obs.type === 'ground' ? "#ff3e3e" : "#ffcc00";
            ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
        }
    }

    function endGame() {
        isGameOver = true;
        if (score > highScore) localStorage.setItem("robotBestDist", score);
        alert("تحطمت Roz! المسافة: " + score + " متر");
        location.reload();
    }

    // التحكم بالكمبيوتر
    window.addEventListener("keydown", (e) => {
        if (e.code === "Space" && robot.grounded) { robot.dy = -16; robot.grounded = false; }
        if (e.code === "ArrowDown") robot.isCrouching = true;
    });
    window.addEventListener("keyup", (e) => { if (e.code === "ArrowDown") robot.isCrouching = false; });

    // --- حل مشكلة الموبايل (نظام اللمس المزدوج) ---
    canvas.addEventListener("touchstart", (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touchX = e.touches[0].clientX - rect.left;
        
        // النصف الأيمن من الشاشة للقفز
        if (touchX > (canvas.offsetWidth / 2)) {
            if (robot.grounded) { robot.dy = -16; robot.grounded = false; }
        } 
        // النصف الأيسر من الشاشة للانحناء
        else {
            robot.isCrouching = true;
        }
    }, {passive: false});

    canvas.addEventListener("touchend", (e) => {
        // إنهاء الانحناء عند رفع الإصبع عن الشاشة
        robot.isCrouching = false;
    });

    function main() { update(); draw(); requestAnimationFrame(main); }
    main();
</script>
</body>
</html>
