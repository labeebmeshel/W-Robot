<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>The Wild Robot Runner</title>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #2c3e50; font-family: Arial, sans-serif; overflow: hidden; color: #fff; }
        
        /* تصميم الحاوية الخاصة باللعبة */
        #game-container {
            position: relative;
            width: 800px;
            height: 250px;
            border: 4px solid #fff;
            border-radius: 10px;
            /* تحميل خلفية فيلم The Wild Robot */
            background-image: url('wild_robot_bg.jpg'); 
            background-size: cover;
            background-position: center;
            overflow: hidden; /* لإخفاء العوائق الخارجة عن الإطار */
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        #gameCanvas {
            background-color: rgba(255, 255, 255, 0.1); /* طبقة شفافة خفيفة فوق الخلفية */
        }

        .info { position: absolute; top: -50px; left: 0; width: 100%; text-align: center; }
    </style>
</head>
<body>

<div class="info">
    <h2>اضغط على المسافة (Space) للقفز</h2>
    <div id="score">Score: 0</div>
</div>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreElement = document.getElementById("score");

    canvas.width = 800;
    canvas.height = 250;

    // --- تحميل الصور ---
    const robotImg = new Image();
    robotImg.src = 'robot_character.png'; // صورة الروبوت الذي أرفقته

    // متغيرات اللعبة
    let score = 0;
    let gameSpeed = 4;
    let isGameOver = false;
    let gravity = 0.6;

    // خصائص الروبوت (اللاعب)
    const dino = {
        x: 50,
        y: 190, // بداية موقع الروبوت فوق "الأرض"
        width: 50,  // يمكنك تعديل الحجم حسب صورتك
        height: 60, // يمكنك تعديل الحجم حسب صورتك
        dy: 0,
        jumpForce: 13,
        grounded: false
    };

    // العوائق (يمكنك استبدالها بصور عوائق لاحقاً)
    const obstacles = [];

    function spawnObstacle() {
        let height = Math.random() * (60 - 30) + 30;
        obstacles.push({
            x: canvas.width,
            y: canvas.height - height - 10, // فوق الأرض قليلاً
            width: 25,
            height: height,
            color: "#ff4d4d" // لون العائق الأحمر
        });
    }

    function update() {
        if (isGameOver) return;

        // حركة الروبوت والجاذبية
        dino.dy += gravity;
        dino.y += dino.dy;

        // التصادم مع الأرض (تحديد حدود القاع)
        if (dino.y + dino.height > canvas.height - 10) {
            dino.y = canvas.height - dino.height - 10;
            dino.dy = 0;
            dino.grounded = true;
        }

        // تحريك وإنشاء العوائق
        if (Math.random() < 0.015) { // احتمالية ظهور عائق جديد
            if (obstacles.length === 0 || obstacles[obstacles.length - 1].x < canvas.width - 250) {
                spawnObstacle();
            }
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            obstacles[i].x -= gameSpeed;

            // كشف التصادم
            if (dino.x < obstacles[i].x + obstacles[i].width &&
                dino.x + dino.width > obstacles[i].x &&
                dino.y < obstacles[i].y + obstacles[i].height &&
                dino.y + dino.height > obstacles[i].y) {
                isGameOver = true;
                alert("Game Over! Score: " + score);
                location.reload(); // إعادة تحميل اللعبة
            }

            // حذف العائق إذا خرج من الشاشة وزيادة النقاط
            if (obstacles[i].x + obstacles[i].width < 0) {
                obstacles.splice(i, 1);
                score++;
                scoreElement.innerText = "Score: " + score;
                gameSpeed += 0.05; // زيادة الصعوبة تدريجيًا
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // --- رسم الروبوت بدلاً من المربع ---
        if (robotImg.complete) { // التأكد من تحميل الصورة أولاً
            ctx.drawImage(robotImg, dino.x, dino.y, dino.width, dino.height); //
        } else {
            // رسم مربع مؤقت في حال لم يتم تحميل الصورة
            ctx.fillStyle = "#555";
            ctx.fillRect(dino.x, dino.y, dino.width, dino.height);
        }

        // رسم العوائق
        for (let obs of obstacles) {
            ctx.fillStyle = obs.color;
            ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
        }
        
        // رسم خط الأرض
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, canvas.height - 10);
        ctx.lineTo(canvas.width, canvas.height - 10);
        ctx.stroke();
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    // التحكم بالقفز
    window.addEventListener("keydown", (e) => {
        if ((e.code === "Space" || e.code === "ArrowUp") && dino.grounded) {
            dino.dy = -dino.jumpForce;
            dino.grounded = false;
        }
    });

    gameLoop();
</script>
</body>
</html>
