<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Wild Robot Pro - Realistic Motion</title>
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background-color: #050a0f; font-family: sans-serif; overflow: hidden; touch-action: none; }
        #game-container { position: relative; width: 95vw; max-width: 850px; height: 350px; border: 3px solid #00f2ff; border-radius: 20px; overflow: hidden; background: #1b263b; box-shadow: 0 0 50px rgba(0, 242, 255, 0.2); }
        canvas { display: block; width: 100%; height: 100%; }
        .stats { position: absolute; top: 15px; left: 0; width: 100%; display: flex; justify-content: space-around; pointer-events: none; z-index: 100; }
        .box { background: rgba(0,0,0,0.8); padding: 8px 20px; border-radius: 12px; border: 1px solid #00f2ff; color: #00f2ff; font-weight: bold; font-family: monospace; font-size: 20px; }
        .controls-hint { color: rgba(255,255,255,0.5); margin-top: 15px; font-size: 12px; }
    </style>
</head>
<body>

<div class="stats">
    <div class="box">DIST: <span id="score">0</span>m</div>
    <div class="box">BEST: <span id="highScore">0</span>m</div>
</div>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
</div>
<div class="controls-hint">PC: Space & Down Arrow | Mobile: Tap Right to Jump, Left to Duck</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreElement = document.getElementById("score");
    const highScoreElement = document.getElementById("highScore");

    canvas.width = 800;
    canvas.height = 350;

    // تحميل الخلفية التي رفعتها أنت
    const bgImg = new Image();
    bgImg.src = 'wild_robot_bg.jpg';
    let bgX = 0;

    let score = 0;
    let highScore = localStorage.getItem("robotBestDist") || 0;
    highScoreElement.innerText = highScore;
    let gameSpeed = 6;
    let isGameOver = false;
    let frame = 0;

    const robot = {
        x: 100, y: 240, width: 50, height: 80,
        dy: 0, jumpForce: 14, grounded: false, isCrouching: false,
        legPhase: 0,
        draw() {
            ctx.save();
            let drawY = this.isCrouching ? this.y + 35 : this.y;
            let drawH = this.isCrouching ? 45 : this.height;

            // --- حركة الأرجل الواقعية ---
            this.legPhase += gameSpeed * 0.04;
            const leg1 = Math.sin(this.legPhase) * 20;
            const leg2 = Math.sin(this.legPhase + Math.PI) * 20;

            ctx.strokeStyle = "#999";
            ctx.lineWidth = 8;
            ctx.lineCap = "round";

            if (this.grounded && !this.isCrouching) {
                // الرجل 1
                ctx.beginPath(); ctx.moveTo(this.x + 15, drawY + drawH - 10);
                ctx.lineTo(this.x + 10 + leg1, drawY + drawH + 15); ctx.stroke();
                // الرجل 2
                ctx.beginPath(); ctx.moveTo(this.x + 35, drawY + drawH - 10);
                ctx.lineTo(this.x + 40 + leg2, drawY + drawH + 15); ctx.stroke();
            }

            // --- الجسم (الروبوت الفضي) ---
            ctx.fillStyle = "#e0e1dd";
            ctx.beginPath();
            ctx.roundRect(this.x, drawY, this.width, drawH - 10, 10);
            ctx.fill();

            // الرأس (يتحرك للأعلى والأسفل قليلاً أثناء الجري)
            let bounce = Math.cos(this.legPhase * 2) * 3;
            let headY = (this.isCrouching ? drawY + 5 : this.y - 15) + bounce;
            
            ctx.beginPath();
            ctx.arc(this.x + this.width/2, headY, 22, 0, Math.PI*2);
            ctx.fill();

            // العيون الزرقاء المتوهجة
            ctx.fillStyle = "#00f2ff";
            ctx.shadowBlur = 15; ctx.shadowColor = "#00f2ff";
            ctx.beginPath();
            ctx.arc(this.x + this.width/2 - 8, headY - 4, 5, 0, Math.PI*2);
            ctx.arc(this.x + this.width/2 + 8, headY - 4, 5, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }
    };

    const obstacles = [];
    function spawnObstacle() {
        const isAir = Math.random() > 0.6;
        if (isAir) {
            // عائق جوي (يجب الانحناء تحته) - تم تنزيله ليكون خطيراً
            obstacles.push({ x: canvas.width, y: 180, width: 50, height: 30, type: 'air' });
        } else {
            // عائق أرضي
            obstacles.push({ x: canvas.width, y: 280, width: 30, height: 50, type: 'ground' });
        }
    }

    function update() {
        if (isGameOver) return;
        frame++;
        
        bgX -= gameSpeed * 0.7;
        if (bgX <= -canvas.width) bgX = 0;

        score += Math.floor(gameSpeed / 5);
        scoreElement.innerText = score;

        robot.dy += 0.75; // جاذبية أقوى لثبات أكثر
        robot.y += robot.dy;

        if (robot.y + robot.height > 330) {
            robot.y = 330 - robot.height;
            robot.dy = 0;
            robot.grounded = true;
        }

        if (frame % 90 === 0) spawnObstacle();

        for (let i = obstacles.length - 1; i >= 0; i--) {
            obstacles[i].x -= gameSpeed;

            // تصادم دقيق جداً
            let rY = robot.isCrouching ? robot.y + 35 : robot.y - 20; // شملنا الرأس في الحساب
            let rH = robot.isCrouching ? 50 : robot.height + 20;

            if (robot.x + 5 < obstacles[i].x + obstacles[i].width &&
                robot.x + robot.width - 5 > obstacles[i].x &&
                rY < obstacles[i].y + obstacles[i].height &&
                rY + rH > obstacles[i].y) {
                endGame();
            }

            if (obstacles[i].x + obstacles[i].width < 0) obstacles.splice(i, 1);
        }
        if (frame % 1000 === 0) gameSpeed += 0.8;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // رسم الخلفية (مرتين لضمان التكرار)
        if (bgImg.complete) {
            ctx.drawImage(bgImg, bgX, 0, canvas.width, canvas.height);
            ctx.drawImage(bgImg, bgX + canvas.width, 0, canvas.width, canvas.height);
        }

        robot.draw();

        for (let obs of obstacles) {
            ctx.fillStyle = obs.type === 'ground' ? "#ff3e3e" : "#ffcc00";
            ctx.shadowBlur = 10; ctx.shadowColor = ctx.fillStyle;
            ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            ctx.shadowBlur = 0;
        }
    }

    function endGame() {
        isGameOver = true;
        if (score > highScore) localStorage.setItem("robotBestDist", score);
        alert("تحطمت Roz! المسافة: " + score + " متر");
        location.reload();
    }

    // التحكم
    window.addEventListener("keydown", (e) => {
        if (e.code === "Space" && robot.grounded) { robot.dy = -15; robot.grounded = false; }
        if (e.code === "ArrowDown") robot.isCrouching = true;
    });
    window.addEventListener("keyup", (e) => { if (e.code === "ArrowDown") robot.isCrouching = false; });

    // تحكم الموبايل (يمين ويسار)
    canvas.addEventListener("touchstart", (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touchX = e.touches[0].clientX - rect.left;
        if (touchX > canvas.width / 2) { 
            if (robot.grounded) { robot.dy = -15; robot.grounded = false; }
        } else {
            robot.isCrouching = true;
        }
    }, {passive: false});

    canvas.addEventListener("touchend", () => { robot.isCrouching = false; });

    function main() { update(); draw(); requestAnimationFrame(main); }
    main();
</script>
</body>
</html>
