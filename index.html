<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Wild Robot Pro - Fixed Controls</title>
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background-color: #050a0f; font-family: sans-serif; overflow: hidden; touch-action: none; }
        #game-container { position: relative; width: 95vw; max-width: 850px; height: 350px; border: 3px solid #00f2ff; border-radius: 20px; overflow: hidden; background: #1b263b; box-shadow: 0 0 50px rgba(0, 242, 255, 0.2); }
        canvas { display: block; width: 100%; height: 100%; cursor: pointer; }
        .stats { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-around; pointer-events: none; z-index: 100; }
        .box { background: rgba(0,0,0,0.8); padding: 8px 20px; border-radius: 12px; border: 1px solid #00f2ff; color: #00f2ff; font-weight: bold; font-family: monospace; font-size: 20px; }
    </style>
</head>
<body>

<div class="stats">
    <div class="box">DIST: <span id="score">0</span>m</div>
    <div class="box">BEST: <span id="highScore">0</span>m</div>
</div>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreElement = document.getElementById("score");
    const highScoreElement = document.getElementById("highScore");

    canvas.width = 800;
    canvas.height = 350;

    const bgImg = new Image();
    bgImg.src = 'wild_robot_bg.jpg';
    let bgX = 0;

    let score = 0;
    let highScore = localStorage.getItem("robotBestDist") || 0;
    highScoreElement.innerText = highScore;
    let gameSpeed = 6.5;
    let isGameOver = false;
    let frame = 0;

    const robot = {
        x: 100, y: 240, width: 55, height: 85,
        dy: 0, jumpForce: 15, grounded: false, isCrouching: false,
        legPhase: 0,
        draw() {
            ctx.save();
            let h = this.isCrouching ? 45 : this.height;
            let y = this.isCrouching ? this.y + 40 : this.y;

            this.legPhase += gameSpeed * 0.045;
            let legY = Math.sin(this.legPhase) * 15;

            ctx.strokeStyle = "#999";
            ctx.lineWidth = 7;
            ctx.lineCap = "round";

            if (this.grounded && !this.isCrouching) {
                ctx.beginPath(); ctx.moveTo(this.x + 15, y + h - 10);
                ctx.lineTo(this.x + 10 + (legY/2), y + h + 15); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(this.x + 40, y + h - 10);
                ctx.lineTo(this.x + 45 - (legY/2), y + h + 15); ctx.stroke();
            }

            ctx.fillStyle = "#e0e1dd";
            ctx.beginPath(); ctx.roundRect(this.x, y, this.width, h - 10, 15); ctx.fill();

            let bounce = Math.cos(this.legPhase * 2) * 4;
            let headY = (this.isCrouching ? y + 8 : this.y - 18) + (this.grounded ? bounce : 0);
            
            ctx.beginPath(); ctx.arc(this.x + this.width/2, headY, 24, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#00f2ff"; ctx.shadowBlur = 15; ctx.shadowColor = "#00f2ff";
            ctx.beginPath(); ctx.arc(this.x + this.width/2 - 9, headY - 4, 5, 0, Math.PI*2);
            ctx.arc(this.x + this.width/2 + 9, headY - 4, 5, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        },
        jump() {
            if (this.grounded) {
                this.dy = -this.jumpForce;
                this.grounded = false;
            }
        }
    };

    const obs = [];
    function spawn() {
        const isAir = Math.random() > 0.55;
        if (isAir) {
            obs.push({ x: canvas.width, y: 195, w: 50, h: 35, type: 'air' });
        } else {
            obs.push({ x: canvas.width, y: 285, w: 35, h: 45, type: 'ground' });
        }
    }

    function update() {
        if (isGameOver) return;
        frame++;
        bgX -= gameSpeed * 0.75;
        if (bgX <= -canvas.width) bgX = 0;
        score += Math.floor(gameSpeed / 6);
        scoreElement.innerText = score;
        robot.dy += 0.8; 
        robot.y += robot.dy;
        if (robot.y + robot.height > 330) { robot.y = 330 - robot.height; robot.dy = 0; robot.grounded = true; }
        if (frame % 85 === 0) spawn();
        for (let i = obs.length - 1; i >= 0; i--) {
            obs[i].x -= gameSpeed;
            let rY = robot.isCrouching ? robot.y + 40 : robot.y - 25; 
            let rH = robot.isCrouching ? 55 : robot.height + 25;
            if (robot.x + 8 < obs[i].x + obs[i].w && robot.x + robot.width - 8 > obs[i].x &&
                rY < obs[i].y + obs[i].h && rY + rH > obs[i].y) {
                gameOver();
            }
            if (obs[i].x + obs[i].w < 0) obs.splice(i, 1);
        }
        if (frame % 1000 === 0) gameSpeed += 0.7;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (bgImg.complete) {
            ctx.drawImage(bgImg, bgX, 0, canvas.width, canvas.height);
            ctx.drawImage(bgImg, bgX + canvas.width, 0, canvas.width, canvas.height);
        }
        robot.draw();
        for (let o of obs) {
            ctx.fillStyle = o.type === 'ground' ? "#ff3e3e" : "#ffcc00";
            ctx.fillRect(o.x, o.y, o.w, o.h);
        }
    }

    function gameOver() {
        isGameOver = true;
        if (score > highScore) localStorage.setItem("robotBestDist", score);
        alert("Game Over! Score: " + score + "m");
        location.reload();
    }

    // --- نظام التحكم المعدل (الكمبيوتر) ---
    window.addEventListener("keydown", (e) => {
        if (e.code === "Space") robot.jump();
        if (e.code === "ArrowDown") robot.isCrouching = true;
    });
    window.addEventListener("keyup", (e) => {
        if (e.code === "ArrowDown") robot.isCrouching = false;
    });

    // --- نظام التحكم المعدل (الموبايل) ---
    const handleTouch = (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        // نحصل على مكان اللمس بالنسبة لعرض الكانفاس الحقيقي
        const touchX = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
        
        if (touchX > canvas.width / 2) {
            robot.jump(); // النط في اليمين
        } else {
            robot.isCrouching = true; // الانحناء في الشمال
        }
    };

    canvas.addEventListener("touchstart", handleTouch, { passive: false });
    canvas.addEventListener("touchend", (e) => {
        e.preventDefault();
        robot.isCrouching = false;
    }, { passive: false });

    (function loop() { update(); draw(); requestAnimationFrame(loop); })();
</script>
</body>
</html>
