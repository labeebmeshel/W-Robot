<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Wild Robot - BEMAX Ultra</title>
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: #050a0f; font-family: sans-serif; overflow: hidden; touch-action: none; }
        #game-container { position: relative; width: 95vw; max-width: 800px; height: 350px; border: 3px solid #00f2ff; border-radius: 20px; overflow: hidden; background: #1b263b; box-shadow: 0 0 40px rgba(0, 242, 255, 0.3); }
        canvas { display: block; width: 100%; height: 100%; }
        .stats { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-around; pointer-events: none; z-index: 100; }
        .box { background: rgba(0,0,0,0.8); padding: 8px 15px; border-radius: 12px; border: 1px solid #00f2ff; color: #00f2ff; font-family: monospace; font-size: 18px; }
    </style>
</head>
<body>

<div class="stats">
    <div class="box">DIST: <span id="score">0</span>m</div>
    <div class="box">BEST: <span id="highScore">0</span>m</div>
</div>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreElement = document.getElementById("score");
    const highScoreElement = document.getElementById("highScore");

    canvas.width = 800; canvas.height = 350;

    let score = 0;
    let highScore = localStorage.getItem("bestDist") || 0;
    highScoreElement.innerText = highScore;
    let gameSpeed = 6;
    let isGameOver = false;
    let frame = 0;

    // كائن الروبوت Roz بتصميم احترافي مرسوم بالكود لضمان التشغيل
    const robot = {
        x: 100, y: 230, width: 50, height: 85,
        baseH: 85, crouchH: 45,
        dy: 0, jumpF: -16, grounded: false, isCrouching: false,
        draw() {
            ctx.save();
            let h = this.isCrouching ? this.crouchH : this.baseH;
            let y = this.isCrouching ? this.y + (this.baseH - this.crouchH) : this.y;
            
            // حركة جري واقعية (اهتزاز وتمايل)
            let bounce = Math.sin(frame * 0.2) * 4;
            if (!this.grounded) bounce = 0;

            // الجسم الفضي
            ctx.fillStyle = "#e0e1dd";
            ctx.beginPath();
            ctx.roundRect(this.x, y + bounce, this.width, h - 10, 12);
            ctx.fill();

            // الرأس
            let headY = (this.isCrouching ? y + 5 : this.y - 15) + bounce;
            ctx.beginPath();
            ctx.arc(this.x + this.width/2, headY, 22, 0, Math.PI*2);
            ctx.fill();

            // العيون الزرقاء المتوهجة (علامة Roz المميزة)
            ctx.fillStyle = "#00f2ff";
            ctx.shadowBlur = 15; ctx.shadowColor = "#00f2ff";
            ctx.beginPath();
            ctx.arc(this.x + this.width/2 - 8, headY - 4, 5, 0, Math.PI*2);
            ctx.arc(this.x + this.width/2 + 8, headY - 4, 5, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }
    };

    const obs = [];
    function addObs() {
        const isAir = Math.random() > 0.5;
        obs.push({
            x: canvas.width,
            y: isAir ? 210 : 280, // العائق الجوي منخفض لدرجة تطلب الانحناء
            w: 35, h: isAir ? 30 : 50,
            type: isAir ? 'air' : 'ground'
        });
    }

    function update() {
        if (isGameOver) return;
        frame++;
        score += Math.floor(gameSpeed / 6);
        scoreElement.innerText = score;

        robot.dy += 0.8; robot.y += robot.dy;
        if (robot.y + robot.baseH > 330) { robot.y = 330 - robot.baseH; robot.dy = 0; robot.grounded = true; }

        if (frame % 80 === 0) addObs();

        for (let i = obs.length - 1; i >= 0; i--) {
            obs[i].x -= gameSpeed;
            
            // منطقة التصادم (Hitbox) - دقيقة جداً
            let rY = robot.isCrouching ? robot.y + (robot.baseH - robot.crouchH) : robot.y - 10;
            let rH = robot.isCrouching ? robot.crouchH : robot.baseH + 10;

            if (robot.x + 10 < obs[i].x + obs[i].w && robot.x + robot.width - 10 > obs[i].x &&
                rY < obs[i].y + obs[i].h && rY + rH > obs[i].y) {
                isGameOver = true;
                if (score > highScore) localStorage.setItem("bestDist", score);
                alert("تحطمت Roz! المسافة: " + score + " متر");
                location.reload();
            }
            if (obs[i].x + obs[i].w < 0) obs.splice(i, 1);
        }
        if (frame % 1000 === 0) gameSpeed += 0.5;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // رسم أرضية الغابة
        ctx.fillStyle = "#1b263b";
        ctx.fillRect(0, 330, canvas.width, 20);
        robot.draw();
        for (let o of obs) {
            ctx.fillStyle = o.type === 'ground' ? "#ff3e3e" : "#ffcc00";
            ctx.fillRect(o.x, o.y, o.w, o.h);
        }
    }

    // التحكم (موبايل + كمبيوتر)
    window.addEventListener("keydown", (e) => {
        if (e.code === "Space" && robot.grounded) { robot.dy = robot.jumpF; robot.grounded = false; }
        if (e.code === "ArrowDown") robot.isCrouching = true;
    });
    window.addEventListener("keyup", (e) => { if (e.code === "ArrowDown") robot.isCrouching = false; });

    canvas.addEventListener("touchstart", (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const tx = e.touches[0].clientX - rect.left;
        if (tx > canvas.width / 2) { 
            if (robot.grounded) { robot.dy = robot.jumpF; robot.grounded = false; }
        } else { robot.isCrouching = true; }
    }, {passive: false});

    canvas.addEventListener("touchend", () => { robot.isCrouching = false; });

    (function loop() { update(); draw(); requestAnimationFrame(loop); })();
</script>
</body>
</html>
